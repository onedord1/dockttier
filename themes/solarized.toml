# dockttier theme: solarized
# Solarized Dark, line (━─) bars, quadrant spinner.
# Install: cp themes/solarized.toml ~/.config/dockttier/config.toml

[theme]
preset        = "solarized"
disable_emoji = false

[behavior]
show_build_logs  = false
stats_timeout_ms = 500
pre_snapshot     = true

[passthrough]
commands = ["login", "logout", "trust"]
