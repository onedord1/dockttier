# dockttier theme: dracula
# The classic Dracula palette, shaded (▓░) bars, braille spinner.
# Install: cp themes/dracula.toml ~/.config/dockttier/config.toml

[theme]
preset        = "dracula"
disable_emoji = false

[behavior]
show_build_logs  = false
stats_timeout_ms = 500
pre_snapshot     = true

[passthrough]
commands = ["login", "logout", "trust"]
