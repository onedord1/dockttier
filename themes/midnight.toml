# dockttier theme: midnight (default)
# GitHub-dark scheme with a mint accent, solid block bars, braille spinner.
# Install: cp themes/midnight.toml ~/.config/dockttier/config.toml

[theme]
preset        = "midnight"
disable_emoji = false

[behavior]
show_build_logs  = false
stats_timeout_ms = 500
pre_snapshot     = true

[passthrough]
commands = ["login", "logout", "trust"]
