# dockttier theme: neon
# Cyberpunk magenta + cyan on near-black, ribbon (▰▱) bars, rotating-arc spinner.
# Install: cp themes/neon.toml ~/.config/dockttier/config.toml

[theme]
preset        = "neon"
disable_emoji = false

[behavior]
show_build_logs  = false
stats_timeout_ms = 500
pre_snapshot     = true

[passthrough]
commands = ["login", "logout", "trust"]
