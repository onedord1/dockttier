name: release

# Push a tag like v0.1.0 to build cross-platform binaries and publish a GitHub
# Release with the tarballs install.sh expects. Uses the built-in GITHUB_TOKEN —
# no extra secrets required.
on:
  push:
    tags:
    - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build release artifacts
      run: |
        set -euo pipefail
        VERSION="${GITHUB_REF_NAME#v}"
        mkdir -p dist
        for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
          GOOS="${target%/*}"
          GOARCH="${target#*/}"
          echo "Building ${GOOS}/${GOARCH}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath \
            -ldflags "-s -w -X github.com/dockttier/dockttier/cmd.version=${VERSION}" \
            -o dist/dockttier .
          tar -C dist -czf "dist/dockttier_${VERSION}_${GOOS}_${GOARCH}.tar.gz" dockttier
          rm -f dist/dockttier
        done
        ( cd dist && sha256sum *.tar.gz > checksums.txt )
        ls -la dist

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.tar.gz
          dist/checksums.txt
        generate_release_notes: true
